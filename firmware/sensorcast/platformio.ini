; M5Stack Core2 - センサー配信機 (SensorCast)
; SoftAP を立てて WebSocket で内蔵IMU(加速度)を配信する。
; Android(EvenHubアプリ webview) や PC ブラウザがこの AP につなぎ、
; ws://192.168.4.1:81/ を受けて Even G2 のレンズに表示する。

[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino

monitor_speed = 115200

; 書き込み設定（hello で実績のある設定。Connecting... 中にリセット押下）
upload_port = COM5
upload_speed = 115200
board_upload.before_reset = default_reset
board_upload.after_reset = hard_reset

; M5Unified: 本体制御 / links2004 WebSockets: WS サーバ
lib_deps =
  m5stack/M5Unified
  links2004/WebSockets
