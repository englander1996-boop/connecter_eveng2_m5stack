; M5Stack Core2 - 最初の動作確認プロジェクト (Hello)
; これは「画面に文字を出す＋タッチで数える」だけの最小プログラム。
; M5Stack と PC が正しく繋がって書き込めることを確認するためのもの。

[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino

; シリアルモニタの通信速度。main.cpp の Serial と一致させる。
monitor_speed = 115200

; 書き込み設定（接続失敗対策）
upload_port = COM5
upload_speed = 115200
board_upload.before_reset = default_reset
board_upload.after_reset = hard_reset

; M5Stack Core2 を簡単に扱うための公式ライブラリ（自動でダウンロードされる）
lib_deps = m5stack/M5Unified
